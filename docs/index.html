<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MercariSizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; position: fixed; }
  body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

  .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── Welcome ── */
  #welcome {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    padding: 32px 24px; align-items: center; justify-content: center; gap: 20px;
  }
  #welcome .emoji { font-size: 3.5rem; }
  #welcome h1 { font-size: 1.9rem; letter-spacing: 0.02em; }
  #welcome p { font-size: 0.95rem; line-height: 1.6; color: #ccc; text-align: center; max-width: 320px; }
  .info-box {
    background: rgba(255,255,255,0.08); border-radius: 14px;
    padding: 14px 18px; max-width: 340px; width: 100%;
    border-left: 3px solid #ff9500;
  }
  .info-box .label { font-size: 0.72rem; color: #ff9500; margin-bottom: 4px; font-weight: 700; }
  .info-box .body { font-size: 0.88rem; line-height: 1.5; }
  .start-btn {
    background: #e94560; color: #fff; border: none; border-radius: 32px;
    padding: 18px 44px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 24px rgba(233,69,96,0.5);
    margin-top: 8px;
  }
  .start-btn:active { transform: scale(0.96); }

  /* ── Camera ── */
  #camera-screen { background: #000; }
  #camera-video { width: 100%; height: 100%; object-fit: cover; }

  .overlay {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; flex-direction: column;
  }
  .top-bar {
    background: linear-gradient(180deg, rgba(0,0,0,0.72), rgba(0,0,0,0));
    padding: 20px 20px 32px; pointer-events: auto;
    padding-top: max(20px, env(safe-area-inset-top));
  }
  .top-bar .step { font-size: 0.75rem; color: #ff9500; font-weight: 700; letter-spacing: 0.1em; }
  .top-bar h2 { font-size: 1.2rem; margin-top: 4px; }
  .top-bar p { font-size: 0.85rem; color: #ddd; margin-top: 8px; line-height: 1.5; }
  .bottom-bar {
    margin-top: auto; pointer-events: auto;
    padding: 28px 24px;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(0,0,0,0.65), transparent);
    display: flex; justify-content: center;
  }
  .capture-btn {
    width: 78px; height: 78px; border-radius: 50%;
    background: #fff; border: none; cursor: pointer; padding: 0;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.95), 0 0 0 8px rgba(255,255,255,0.25);
  }
  .capture-btn:active { transform: scale(0.92); }

  /* Card alignment guide overlay (camera mode) */
  .guide-frame {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 78%; max-width: 280px; aspect-ratio: 1.586;
    border: 2px dashed rgba(255,149,0,0.85);
    border-radius: 6px; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .guide-frame .card-icon { font-size: 1.6rem; color: rgba(255,149,0,0.9); font-weight: 800; }

  /* ── Measure ── */
  #measure-screen { background: #000; }
  .canvas-wrap {
    flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center;
    overflow: hidden; padding-top: 110px; padding-bottom: 90px;
  }
  #photo-canvas {
    max-width: 100%; max-height: 100%;
    touch-action: none; cursor: crosshair;
    object-fit: contain;
  }
  .undo-btn {
    position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); right: 16px;
    pointer-events: auto;
    background: rgba(0,0,0,0.72); color: #fff; border: none;
    border-radius: 22px; padding: 12px 22px; font-size: 0.9rem; cursor: pointer;
    backdrop-filter: blur(10px);
  }
  .undo-btn:active { transform: scale(0.94); }
  .undo-btn:disabled { opacity: 0.4; }
  .retake-btn {
    position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: 16px;
    pointer-events: auto;
    background: rgba(0,0,0,0.72); color: #fff; border: none;
    border-radius: 22px; padding: 12px 18px; font-size: 0.9rem; cursor: pointer;
    backdrop-filter: blur(10px);
  }

  /* ── Result ── */
  #result-screen {
    background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 100%);
    padding: 32px 20px; align-items: center; justify-content: center; gap: 18px;
  }
  #result-screen h2 { font-size: 1.4rem; }
  .dims-box { text-align: center; }
  .dims-label { font-size: 0.78rem; color: #aaa; letter-spacing: 0.08em; margin-bottom: 6px; }
  .dims { font-size: 1.9rem; color: #e94560; font-weight: 800; }
  .ship-list { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
  .ship-item {
    background: rgba(255,255,255,0.08); border-radius: 12px;
    padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
  }
  .ship-item.best { background: rgba(76,175,80,0.18); border: 1px solid rgba(76,175,80,0.4); }
  .ship-name { font-size: 0.92rem; }
  .ship-price { font-size: 1.15rem; font-weight: 800; color: #4caf50; }
  .ship-empty { color: #aaa; text-align: center; padding: 20px; font-size: 0.9rem; }
  .reset-btn {
    background: rgba(255,255,255,0.15); color: #fff; border: none;
    border-radius: 24px; padding: 14px 32px; font-size: 0.95rem; cursor: pointer;
    margin-top: 8px;
  }
  .reset-btn:active { transform: scale(0.96); }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); color: #fff;
    border-radius: 12px; padding: 14px 20px; font-size: 0.9rem;
    z-index: 1000; display: none; max-width: 80vw; text-align: center;
  }
</style>
</head>
<body>

<!-- ── Welcome ── -->
<div id="welcome" class="screen active">
  <div class="emoji">📦</div>
  <h1>MercariSizer</h1>
  <p>クレカ（または交通系ICカード）を物体の横に置いて、サイズと配送料金をその場で計算します。</p>
  <div class="info-box">
    <div class="label">必要なもの</div>
    <div class="body">クレカ・Suica・図書カードなど<br>(85.60 × 53.98 mm の標準カード)</div>
  </div>
  <button class="start-btn" onclick="startCamera()">📷 計測を始める</button>
  <p style="font-size:0.72rem; color:#888; margin-top:4px">カメラへのアクセス許可が必要です</p>
</div>

<!-- ── Camera ── -->
<div id="camera-screen" class="screen">
  <video id="camera-video" playsinline autoplay muted></video>
  <div class="overlay">
    <div class="top-bar">
      <div class="step" id="cam-step">STEP 1 / 2</div>
      <h2 id="cam-title">真上から撮影</h2>
      <p id="cam-desc">物体の横にカードを置き、真上から撮影</p>
    </div>
    <div class="bottom-bar">
      <button class="capture-btn" id="capture-btn" onclick="capture()" aria-label="撮影"></button>
    </div>
  </div>
</div>

<!-- ── Measure ── -->
<div id="measure-screen" class="screen">
  <div class="canvas-wrap">
    <canvas id="photo-canvas"></canvas>
  </div>
  <div class="overlay">
    <div class="top-bar">
      <div class="step" id="meas-step">STEP 1 / 2</div>
      <h2 id="meas-title">タップしてください</h2>
      <p id="meas-desc"></p>
    </div>
  </div>
  <button class="retake-btn" onclick="retake()">↶ 撮り直し</button>
  <button class="undo-btn" id="undo-btn" onclick="undoTap()">↺ 1つ戻る</button>
</div>

<!-- ── Result ── -->
<div id="result-screen" class="screen">
  <h2>✅ 測定完了</h2>
  <div class="dims-box">
    <div class="dims-label">縦 × 横 × 高さ</div>
    <div class="dims" id="dims-text"></div>
    <div class="dims-label" id="sum-text" style="margin-top:8px"></div>
  </div>
  <div class="ship-list" id="ship-list"></div>
  <button class="reset-btn" onclick="resetAll()">もう一度測定</button>
</div>

<div id="toast"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────
const CARD_LONG_MM = 85.60;  // ISO/IEC 7810 ID-1

// Mercari shipping (sorted dimensions: largest, mid, smallest in cm)
const SHIPPING = [
  { name: 'ネコポス',           price: 210,  fits: (s) => s[0]<=31.2 && s[1]<=22.8 && s[2]<=3 },
  { name: 'ゆうパケット',         price: 230,  fits: (s) => s[0]<=34   && s[1]<=24.8 && s[2]<=3 },
  { name: 'ゆうパケットポストmini', price: 160, fits: (s) => s[0]<=21   && s[1]<=17   && s[2]<=3 },
  { name: '宅急便コンパクト',     price: 520,  fits: (s) => s[0]<=34   && s[1]<=24.8 && s[2]<=8 },
  { name: 'ゆうパック 60サイズ', price: 770,  fits: (s,sum) => sum<=60  && s[0]<=60 },
  { name: '宅急便 60サイズ',     price: 750,  fits: (s,sum) => sum<=60  && s[0]<=60 },
  { name: '宅急便 80サイズ',     price: 870,  fits: (s,sum) => sum<=80  && s[0]<=60 },
  { name: 'ゆうパック 80',       price: 870,  fits: (s,sum) => sum<=80 },
  { name: '宅急便 100サイズ',    price: 1050, fits: (s,sum) => sum<=100 && s[0]<=60 },
  { name: 'ゆうパック 100',      price: 1070, fits: (s,sum) => sum<=100 },
  { name: '宅急便 120サイズ',    price: 1200, fits: (s,sum) => sum<=120 && s[0]<=60 },
  { name: '宅急便 140サイズ',    price: 1450, fits: (s,sum) => sum<=140 && s[0]<=60 },
  { name: '宅急便 160サイズ',    price: 1700, fits: (s,sum) => sum<=160 && s[0]<=60 },
];

// ── State ──────────────────────────────────────────────────────────────
const Phase = {
  WELCOME: 'welcome',
  TOP_CAMERA:  'top_camera',
  TOP_MEASURE: 'top_measure',
  SIDE_CAMERA: 'side_camera',
  SIDE_MEASURE:'side_measure',
  RESULT: 'result',
};

let phase = Phase.WELCOME;
let stream = null;
let topImage = null, sideImage = null;       // HTMLImageElement
let topPoints = [], sidePoints = [];         // {x, y} in canvas/image space
let dims = { w: 0, l: 0, h: 0 };

// ── Helpers ────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.style.display = 'none', ms);
}

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

// ── Camera ─────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
      },
      audio: false,
    });
  } catch (e) {
    toast('カメラが起動できません: ' + (e.message || e.name), 4000);
    return;
  }

  const video = document.getElementById('camera-video');
  video.srcObject = stream;
  await video.play().catch(()=>{});

  phase = Phase.TOP_CAMERA;
  showScreen('camera-screen');
  updateCameraUI();
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  document.getElementById('camera-video').srcObject = null;
}

function updateCameraUI() {
  const isTop = phase === Phase.TOP_CAMERA;
  document.getElementById('cam-step').textContent  = isTop ? 'STEP 1 / 2' : 'STEP 2 / 2';
  document.getElementById('cam-title').textContent = isTop ? '真上から撮影' : '横から撮影';
  document.getElementById('cam-desc').textContent  = isTop
    ? '物体の横にカードを置き、真上から撮影してください'
    : 'カードを物体の側面に立てかけて、真横から撮影してください';
}

function capture() {
  const video  = document.getElementById('camera-video');
  if (!video.videoWidth) { toast('カメラ準備中…'); return; }

  const vw = video.videoWidth, vh = video.videoHeight;
  const portraitScreen = window.innerHeight > window.innerWidth;
  const landscapeVideo = vw > vh;
  const rotate = portraitScreen && landscapeVideo;

  // Off-screen canvas for capture
  const cap = document.createElement('canvas');
  const cctx = cap.getContext('2d');
  if (rotate) {
    cap.width = vh; cap.height = vw;
    cctx.translate(vh, 0);
    cctx.rotate(Math.PI / 2);
    cctx.drawImage(video, 0, 0);
  } else {
    cap.width = vw; cap.height = vh;
    cctx.drawImage(video, 0, 0);
  }
  const dataUrl = cap.toDataURL('image/jpeg', 0.85);

  const img = new Image();
  img.onload = () => {
    if (phase === Phase.TOP_CAMERA) {
      topImage = img; topPoints = [];
      phase = Phase.TOP_MEASURE;
    } else {
      sideImage = img; sidePoints = [];
      phase = Phase.SIDE_MEASURE;
    }
    showScreen('measure-screen');
    fitCanvasAndDraw();
    updateMeasureUI();
    vibrate(20);
  };
  img.src = dataUrl;
}

// ── Measure: canvas drawing ────────────────────────────────────────────
function fitCanvasAndDraw() {
  const canvas = document.getElementById('photo-canvas');
  const img = phase === Phase.TOP_MEASURE ? topImage : sideImage;
  if (!img) return;

  // Set canvas drawing buffer to image native size
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  // CSS sizing: fit to wrap while preserving aspect (object-fit: contain)
  const wrap = document.querySelector('.canvas-wrap');
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;
  const imgAR = img.naturalWidth / img.naturalHeight;
  const wrapAR = wrapW / wrapH;
  let cssW, cssH;
  if (imgAR > wrapAR) {
    cssW = wrapW; cssH = wrapW / imgAR;
  } else {
    cssH = wrapH; cssW = wrapH * imgAR;
  }
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';

  drawPhoto();
}

function drawPhoto() {
  const canvas = document.getElementById('photo-canvas');
  const ctx = canvas.getContext('2d');
  const img = phase === Phase.TOP_MEASURE ? topImage : sideImage;
  ctx.drawImage(img, 0, 0);

  // Dim overlay so markers stand out
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMarkers(ctx);
}

function drawMarkers(ctx) {
  const points = phase === Phase.TOP_MEASURE ? topPoints : sidePoints;
  const radius = Math.max(canvas.width, canvas.height) * 0.018;
  const lw = Math.max(canvas.width, canvas.height) * 0.005;

  // Card line (orange) — between p0 and p1
  if (points.length >= 2) {
    ctx.strokeStyle = '#ff9500';
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    ctx.lineTo(points[1].x, points[1].y);
    ctx.stroke();
  }

  // Top view: object rectangle
  if (phase === Phase.TOP_MEASURE && points.length >= 4) {
    const a = points[2], b = points[3];
    ctx.strokeStyle = '#34c759';
    ctx.lineWidth = lw;
    ctx.setLineDash([lw*2, lw]);
    ctx.strokeRect(Math.min(a.x,b.x), Math.min(a.y,b.y), Math.abs(b.x-a.x), Math.abs(b.y-a.y));
    ctx.setLineDash([]);
  }

  // Side view: height line (from card-bottom to object-top, projected)
  if (phase === Phase.SIDE_MEASURE && points.length >= 3) {
    ctx.strokeStyle = '#af52de';
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(points[1].x, points[1].y);
    ctx.lineTo(points[2].x, points[2].y);
    ctx.stroke();
  }

  // Markers
  ctx.font = `bold ${radius * 1.4}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  points.forEach((p, i) => {
    const isCard = i < 2;
    const color = isCard ? '#ff9500' : (phase === Phase.TOP_MEASURE ? '#34c759' : '#af52de');

    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.lineWidth = lw * 0.8;
    ctx.strokeStyle = '#fff';
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.fillText(i + 1, p.x, p.y);
  });
}

function updateMeasureUI() {
  const points = phase === Phase.TOP_MEASURE ? topPoints : sidePoints;
  const max = phase === Phase.TOP_MEASURE ? 4 : 3;

  document.getElementById('meas-step').textContent =
    phase === Phase.TOP_MEASURE ? 'STEP 1 / 2 (上面)' : 'STEP 2 / 2 (高さ)';

  const titleEl = document.getElementById('meas-title');
  const descEl  = document.getElementById('meas-desc');

  if (points.length === 0) {
    titleEl.textContent = '🟧 カード長辺の片方をタップ';
    descEl.textContent  = 'カードの長い方の端の角を1つタップ (1/' + max + ')';
  } else if (points.length === 1) {
    titleEl.textContent = '🟧 カード長辺の反対側をタップ';
    descEl.textContent  = '同じ長辺の反対側の角をタップ (2/' + max + ')';
  } else if (points.length === 2) {
    if (phase === Phase.TOP_MEASURE) {
      titleEl.textContent = '🟢 物体の角をタップ';
      descEl.textContent  = '物体の対角の角を1つタップ (3/4)';
    } else {
      titleEl.textContent = '🟣 物体の最上部をタップ';
      descEl.textContent  = '物体の一番高い点をタップ (3/3)';
    }
  } else if (points.length === 3 && phase === Phase.TOP_MEASURE) {
    titleEl.textContent = '🟢 反対の角をタップ';
    descEl.textContent  = '物体の反対の角をタップ (4/4)';
  }

  document.getElementById('undo-btn').disabled = points.length === 0;
}

// ── Tap handling ───────────────────────────────────────────────────────
function canvasCoordsFromEvent(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  const cy = e.touches ? e.touches[0].clientY : (e.changedTouches ? e.changedTouches[0].clientY : e.clientY);
  // CSS-displayed canvas size → drawing buffer size
  const x = (cx - rect.left) * (canvas.width / rect.width);
  const y = (cy - rect.top)  * (canvas.height / rect.height);
  return { x, y };
}

function handleTap(e) {
  if (phase !== Phase.TOP_MEASURE && phase !== Phase.SIDE_MEASURE) return;
  const canvas = document.getElementById('photo-canvas');
  const { x, y } = canvasCoordsFromEvent(e, canvas);
  if (x < 0 || y < 0 || x > canvas.width || y > canvas.height) return;

  const points = phase === Phase.TOP_MEASURE ? topPoints : sidePoints;
  const max = phase === Phase.TOP_MEASURE ? 4 : 3;
  if (points.length >= max) return;

  points.push({ x, y });
  drawPhoto();
  updateMeasureUI();
  vibrate(15);

  if (points.length === max) {
    setTimeout(complete, 400);
  }
}

function undoTap() {
  const points = phase === Phase.TOP_MEASURE ? topPoints : sidePoints;
  if (!points.length) return;
  points.pop();
  drawPhoto();
  updateMeasureUI();
}

function retake() {
  if (phase === Phase.TOP_MEASURE) {
    topPoints = []; topImage = null;
    phase = Phase.TOP_CAMERA;
  } else if (phase === Phase.SIDE_MEASURE) {
    sidePoints = []; sideImage = null;
    phase = Phase.SIDE_CAMERA;
  }
  // Restart camera if stopped
  if (!stream) {
    startCamera();
  } else {
    showScreen('camera-screen');
    updateCameraUI();
  }
}

// ── Compute dimensions ─────────────────────────────────────────────────
function complete() {
  if (phase === Phase.TOP_MEASURE) {
    const cdx = topPoints[1].x - topPoints[0].x;
    const cdy = topPoints[1].y - topPoints[0].y;
    const cardLen = Math.hypot(cdx, cdy);
    if (cardLen < 5) { toast('カードの2点が近すぎます'); topPoints = []; drawPhoto(); updateMeasureUI(); return; }
    const mmPerPx = CARD_LONG_MM / cardLen;

    const ax = cdx / cardLen, ay = cdy / cardLen;
    const px = -ay,            py = ax;

    const odx = topPoints[3].x - topPoints[2].x;
    const ody = topPoints[3].y - topPoints[2].y;
    const along = Math.abs(odx * ax + ody * ay);
    const perp  = Math.abs(odx * px + ody * py);

    const dim1 = (along * mmPerPx) / 10;  // cm
    const dim2 = (perp  * mmPerPx) / 10;
    dims.w = Math.max(dim1, dim2);
    dims.l = Math.min(dim1, dim2);

    phase = Phase.SIDE_CAMERA;
    showScreen('camera-screen');
    updateCameraUI();
    vibrate([20, 60, 20]);
  } else {
    // Card axis: top→bottom direction. We treat points[0]=card top end, points[1]=card bottom end.
    const cdx = sidePoints[0].x - sidePoints[1].x;
    const cdy = sidePoints[0].y - sidePoints[1].y;
    const cardLen = Math.hypot(cdx, cdy);
    if (cardLen < 5) { toast('カードの2点が近すぎます'); sidePoints = []; drawPhoto(); updateMeasureUI(); return; }
    const mmPerPx = CARD_LONG_MM / cardLen;

    const ax = cdx / cardLen, ay = cdy / cardLen;
    const odx = sidePoints[2].x - sidePoints[1].x;
    const ody = sidePoints[2].y - sidePoints[1].y;
    const hPx = Math.abs(odx * ax + ody * ay);
    dims.h = (hPx * mmPerPx) / 10;

    showResult();
  }
}

function showResult() {
  stopCamera();
  phase = Phase.RESULT;
  showScreen('result-screen');

  const sorted = [dims.w, dims.l, dims.h].sort((a,b)=>b-a);
  document.getElementById('dims-text').textContent =
    `${sorted[0].toFixed(1)} × ${sorted[1].toFixed(1)} × ${sorted[2].toFixed(1)} cm`;

  const sum = sorted.reduce((a,b)=>a+b, 0);
  document.getElementById('sum-text').textContent = `三辺合計 ${sum.toFixed(1)} cm`;

  const matches = SHIPPING.filter(s => s.fits(sorted, sum)).sort((a,b) => a.price - b.price);

  const list = document.getElementById('ship-list');
  list.innerHTML = '';

  if (matches.length === 0) {
    list.innerHTML = '<div class="ship-empty">160サイズを超えています。梱包・サービスを直接ご確認ください。</div>';
    return;
  }
  matches.slice(0, 6).forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'ship-item' + (i === 0 ? ' best' : '');
    div.innerHTML = `<span class="ship-name">${s.name}${i===0 ? ' ⭐' : ''}</span><span class="ship-price">¥${s.price}</span>`;
    list.appendChild(div);
  });
  vibrate([30, 80, 30, 80, 30]);
}

// ── Reset ──────────────────────────────────────────────────────────────
function resetAll() {
  topImage = null; sideImage = null;
  topPoints = []; sidePoints = [];
  dims = { w: 0, l: 0, h: 0 };
  phase = Phase.WELCOME;
  stopCamera();
  showScreen('welcome');
}

// ── Bind events ────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('photo-canvas');
  // touchend gives finger-up coords; use it on touch devices to avoid scroll-vs-tap ambiguity
  canvas.addEventListener('click', handleTap);
  canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });

  // Re-fit on rotate/resize
  window.addEventListener('resize', () => {
    if (phase === Phase.TOP_MEASURE || phase === Phase.SIDE_MEASURE) {
      fitCanvasAndDraw();
    }
  });
});
</script>
